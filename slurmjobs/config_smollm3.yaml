# SmolLM2 135M — SignLang SFT v3

task: llm-sft
base_model: HuggingFaceTB/SmolLM2-135M-Instruct
project_name: smollm2-signlang-v3
log: tensorboard
backend: local

data:
  path: /data/mpanag/hf_sign_dataset
  train_split: train
  valid_split: validation
  chat_template: tokenizer
  column_mapping:
    text_column: messages

params:
  save_strategy: steps
  save_steps: 10
  block_size: 1024
  model_max_length: 2048
  epochs: 5
  batch_size: 2
  lr: 3e-4
  peft: true
  quantization: int4
  target_modules: all-linear
  padding: right
  optimizer: paged_adamw_8bit
  scheduler: linear
  gradient_accumulation: 4
  mixed_precision: bf16
  merge_adapter: true
  use_flash_attention_2: false
  eval_strategy: epoch
  add_eos_token: true
  save_total_limit: 2
  weight_decay: 0.01
  max_grad_norm: 1.0
  seed: 42
  report_to: wandb
  wandb_project: smollm-signlang

hub:
  username: marpng
  # token:
  push_to_hub: false
